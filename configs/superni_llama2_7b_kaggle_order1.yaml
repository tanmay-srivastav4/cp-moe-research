experiment:
  name: superni_cpmoe_llama2_order1
  output_dir: /kaggle/working/outputs/superni_llama2_order1
  seed: 7

model:
  name_or_path: meta-llama/Llama-2-7b-hf
  torch_dtype: bfloat16
  load_in_4bit: true
  trust_remote_code: false
  device_map: "auto"
  attn_implementation: sdpa

cp_moe:
  num_experts: 8
  top_k: 2
  rank: 4
  lora_alpha: 8
  lora_dropout: 0.1
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  cp_bias_alpha: 0.2
  reg_lambda: 5000.0
  aux_gamma: 0.1
  damping_xi: 1.0e-6

transient:
  warmup_tokens: 10000
  max_steps: 100
  lr: 2.0e-4

training:
  lr: 2.0e-4
  batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 4
  epochs_per_task: 1
  max_seq_length: 256
  max_new_tokens: 64
  train_max_samples: 500
  eval_max_samples: 25
  evaluate_seen_after_each_task: true
  save_after_each_task: true

data:
  mode: superni
  data_dir: /kaggle/working/cp-moe-research/data/raw/superni
  eval_fraction: 0.1
  train_max_samples: 500
  eval_max_samples: 25
  order:
    - task1572
    - task363
    - task1290
    - task181
    - task002
    - task1510
    - task639
    - task1729
  zero_shot:
    - task073
    - task1590
    - task748
    - task511
    - task591
    - task875